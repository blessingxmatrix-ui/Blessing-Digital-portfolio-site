    function App() {
      const [activeSection, setActiveSection] = useState('home');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [selectedProject, setSelectedProject] = useState(null);
      
      // EmailJS Form States
      const [formName, setFormName] = useState('');
      const [formEmail, setFormEmail] = useState('');
      const [formBusinessName, setFormBusinessName] = useState('');
      const [formSubject, setFormSubject] = useState('');
      const [formType, setFormType] = useState('Business Website');
      const [formDetails, setFormDetails] = useState('');
      
      // Validation and Status States
      const [validationErrors, setValidationErrors] = useState({});
      const [formStatus, setFormStatus] = useState('idle'); // idle, sending, success, error
      const [statusMessage, setStatusMessage] = useState('');

      // Handle active section change on scroll
      useEffect(() => {
        const handleScroll = () => {
          const sections = ['home', 'projects', 'services', 'process', 'about', 'contact'];
          const scrollPosition = window.scrollY + 200;

          for (const section of sections) {
            const el = document.getElementById(section);
            if (el) {
              const top = el.offsetTop;
              const height = el.offsetHeight;
              if (scrollPosition >= top && scrollPosition < top + height) {
                setActiveSection(section);
                break;
              }
            }
          }
        };

        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Smooth Scroll handler
      const handleNavClick = (e, sectionId) => {
        e.preventDefault();
        setMobileMenuOpen(false);
        const targetElement = document.getElementById(sectionId);
        if (targetElement) {
          window.scrollTo({
            top: targetElement.offsetTop - 80, // Offset for sticky navbar
            behavior: 'smooth'
          });
        }
      };

      // Form Validation Checklist
      const validateForm = () => {
        const errors = {};
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        if (!formName.trim()) {
          errors.name = "Please enter your name.";
        }
        if (!formEmail.trim()) {
          errors.email = "Please enter your email address.";
        } else if (!emailRegex.test(formEmail)) {
          errors.email = "Please provide a valid email format.";
        }
        if (!formBusinessName.trim()) {
          errors.businessName = "Business name is required.";
        }
        if (!formSubject.trim()) {
          errors.subject = "Please add a subject for your project inquiry.";
        }
        if (!formDetails.trim()) {
          errors.details = "Please share a few key details about your project goals.";
        }

        setValidationErrors(errors);
        return Object.keys(errors).length === 0;
      };

      const handleContactSubmit = async (e) => {
        e.preventDefault();
        setValidationErrors({});

        // Client-side validation check
        if (!validateForm()) {
          return;
        }

        setFormStatus('sending');

        // EmailJS Credentials matching form setup
        const SERVICE_ID = "service_sjktda5";
        const TEMPLATE_ID = "template_t9ya33w";
        const PUBLIC_KEY = "0JXAOmp_TtYKN8-M0";

        try {
          // Initialize/Verify EmailJS globally or locally via fallback
          const ej = window.emailjs || (typeof emailjs !== 'undefined' ? emailjs : null);
          if (!ej) {
            throw new Error('EmailJS Browser SDK was not detected. Please refresh your browser and try again.');
          }

          // Force update config using exact Public Key
          ej.init({
            publicKey: PUBLIC_KEY,
          });

          // Dynamically map form fields to match your template variables exactly
          const templateParams = {
            from_name: formName,
            reply_to: formEmail,
            business_name: formBusinessName,
            subject: formSubject,
            project_type: formType,
            message: formDetails,
            recipient_email: "officialblessingdigital@gmail.com"
          };

          // Deliver email securely via SDK channel
          const response = await ej.send(
            SERVICE_ID,
            TEMPLATE_ID,
            templateParams
          );

          if (response && (response.status === 200 || response.text === "OK")) {
            setFormStatus('success');
            setStatusMessage('Your proposal request went through! We will reach out to build something impossible to ignore within 24 hours.');
            // Clear all input states
            setFormName('');
            setFormEmail('');
            setFormBusinessName('');
            setFormSubject('');
            setFormDetails('');
          } else {
            throw new Error(response ? `Status: ${response.status} (${response.text})` : 'Undisplayed API status code error.');
          }
        } catch (error) {
          console.error("SDK Delivery Error:", error);
          setFormStatus('error');
          setStatusMessage(error.text || error.message || 'Something went sideways. Please try again or reach out to us directly at officialblessingdigital@gmail.com');
        }
      };

      return (
        <div className="relative min-h-screen">
          
          {/* Background Subtle Ambiance */}
          <div className="absolute top-0 left-0 w-full h-[800px] pointer-events-none overflow-hidden z-0">
            <div className="absolute top-[-10%] left-[5%] w-[40vw] h-[40vw] rounded-full bg-[#6b1d2f]/10 blur-[120px]" />
            <div className="absolute top-[20%] right-[-5%] w-[35vw] h-[35vw] rounded-full bg-[#3a0f18]/15 blur-[100px]" />
          </div>

          {/* STICKY HEADER / NAVIGATION */}

                  <a
                    key={sec}
                    href={`#${sec}`}
                    onClick={(e) => handleNavClick(e, sec)}

                      activeSection === sec ? 'text-[#6b1d2f]' : 'text-neutral-400 hover:text-white'
                    }`}
                  >
                    {sec}
                  </a>
                ))}
              </nav>

              {/* Desktop Action Button */}

                <a

                  onClick={(e) => handleNavClick(e, 'contact')}
                  className="inline-flex px-5 py-2.5 text-xs uppercase tracking-widest font-semibold border border-[#6b1d2f] bg-[#6b1d2f]/10 text-white rounded-md hover:bg-[#6b1d2f] hover:text-white transition-all duration-300 transform hover:-translate-y-0.5"

                </a>

            {mobileMenuOpen && (
              <div className="md:hidden fixed top-20 left-0 w-full bg-[#121212] border-b border-neutral-800/90 z-30 transition-all duration-300 animate-fadeIn">
                <nav className="flex flex-col p-6 space-y-4">

                              className="w-full bg-[#121212] border border-neutral-800 rounded-lg px-4 py-3.5 text-xs text-white focus:outline-none focus:border-[#6b1d2f] transition-all"
                            >
                              <option value="Business Website">Business Website</option>
                              <option value="Landing Page">Landing Page</option>
                              <option value="E-commerce Platform">E-commerce Platform</option>
                              <option value="Website Redesign">Website Redesign</option>
                            </select>
                          </div>
                        </div>

                        <div className="space-y-2">
                          <label className="text-[10px] uppercase font-bold tracking-widest text-neutral-400 block">
                            Subject <span className="text-[#6b1d2f]">*</span>
                          </label>
                          <input
                            type="text"
                            value={formSubject}
                            onChange={(e) => setFormSubject(e.target.value)}
                            placeholder="Designing our brand showcase system"
                            className={`w-full bg-[#121212] border ${validationErrors.subject ? 'border-red-800' : 'border-neutral-800'} rounded-lg px-4 py-3.5 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-[#6b1d2f] transition-all`}
                          />
                        </div>

                        <div className="space-y-2">
                          <label className="text-[10px] uppercase font-bold tracking-widest text-neutral-400 block">
                            Project Details <span className="text-[#6b1d2f]">*</span>
                          </label>
                          <textarea
                            rows="4"
                            value={formDetails}
                            onChange={(e) => setFormDetails(e.target.value)}
                            placeholder="Tell us a bit about your business goals and what makes you unique..."
                            className={`w-full bg-[#121212] border ${validationErrors.details ? 'border-red-800' : 'border-neutral-800'} rounded-lg px-4 py-3.5 text-xs text-white placeholder-neutral-600 focus:outline-none focus:border-[#6b1d2f] transition-all resize-none`}
                          />
                        </div>

                        <button
                          type="submit"
                          disabled={formStatus === 'sending'}
                          className="inline-flex w-full justify-center items-center gap-2 py-4.5 bg-[#6b1d2f] hover:bg-[#802237] text-white text-xs uppercase tracking-widest font-black rounded-lg transition-all duration-300 disabled:opacity-50"
                        >
                          {formStatus === 'sending' ? 'Sending Request...' : 'Submit Project Proposal'}
                          <Icon.ArrowRight className="w-4 h-4" />
                        </button>
                      </>
                    )}

                  </form>
                </div>

              </div>
            </div>
          </section>

          {/* FOOTER */}
          <footer className="bg-[#121212] border-t border-neutral-800/80 relative z-10 py-16">
            <div className="max-w-7xl mx-auto px-6">
              <div className="grid grid-cols-1 md:grid-cols-12 gap-12 items-start">
                
                {/* Left Brand Identity */}
                <div className="md:col-span-4 space-y-4">
                  <Logo />
                  <p className="text-xs text-neutral-500 max-w-xs leading-relaxed">
                    Premium web designs crafted for businesses that command premium respect. Based out of South Africa, shipping worldwide.
                  </p>
                </div>

                {/* Middle Nav Links */}
                <div className="md:col-span-4 space-y-4">
                  <h5 className="text-[10px] uppercase text-neutral-400 font-bold tracking-widest">Navigation</h5>
                  <div className="grid grid-cols-2 gap-2">
                    {['home', 'projects', 'services', 'process', 'about', 'contact'].map((sec) => (
                      <a
                        key={sec}
                        href={`#${sec}`}
                        onClick={(e) => handleNavClick(e, sec)}
                        className="text-xs text-neutral-500 hover:text-white uppercase tracking-wider transition-colors duration-200"
                      >
                        {sec}
                      </a>
                    ))}
                  </div>
                </div>

                {/* Right Copyright & Technical block */}
                <div className="md:col-span-4 space-y-4 text-left md:text-right">
                  <h5 className="text-[10px] uppercase text-neutral-400 font-bold tracking-widest">Digital Presence</h5>
                  <p className="text-xs text-neutral-500 mb-1">
                    &copy; {new Date().getFullYear()} BlessingDigital. All Rights Reserved.
                  </p>
                  <a href="mailto:officialblessingdigital@gmail.com" className="text-xs text-neutral-400 hover:text-[#6b1d2f] transition-colors duration-200 block">
                    officialblessingdigital@gmail.com
                  </a>
                  <p className="text-[10px] text-neutral-600 font-mono mt-3">
                    COMPILATION CODE: BD-REACT-PRO-2026
                  </p>
                </div>

              </div>
            </div>
          </footer>

          {/* FLOATING CONTACT BUTTON */}
          <button
            onClick={(e) => handleNavClick(e, 'contact')}
            className="fixed bottom-6 right-6 z-40 bg-[#6b1d2f] hover:bg-[#802237] text-white p-4.5 rounded-full shadow-2xl shadow-[#6b1d2f]/30 hover:scale-110 active:scale-95 transition-all duration-300 group"
            aria-label="Scroll to Contact"
          >
            <Icon.FloatingMessage className="w-5.5 h-5.5 transition-transform duration-300 group-hover:rotate-12" />
          </button>

          {/* MODULAR PROJECT SHOWCASE MODAL */}
          {selectedProject && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-[#121212]/95 backdrop-blur-sm animate-fadeIn">
              <div className="relative bg-[#161616] border border-neutral-800 rounded-3xl max-w-4xl w-full overflow-hidden shadow-2xl flex flex-col md:flex-row max-h-[90vh]">
                
                {/* Close button in top-right */}
                <button
                  onClick={() => setSelectedProject(null)}
                  className="absolute top-4 right-4 z-20 h-10 w-10 rounded-full bg-[#121212]/80 border border-neutral-800 hover:border-neutral-600 text-white flex items-center justify-center focus:outline-none transition-all duration-200"
                  aria-label="Close details"
                >
                  <Icon.Close className="w-5 h-5" />
                </button>

                {/* Left Cover Image Container */}
                <div className="md:w-1/2 relative min-h-[300px] md:min-h-full bg-neutral-900 overflow-hidden flex items-center justify-center border-b md:border-b-0 md:border-r border-neutral-800">
                  <div className="absolute inset-0 bg-gradient-to-br from-black/20 via-transparent to-black/60 pointer-events-none z-10" />
                  
                  {/* Single Cover Image */}
                  <div className="w-full h-full min-h-[300px] md:absolute md:inset-0">
                    <ProjectCover type={selectedProject.coverType} />
                  </div>
                </div>

                {/* Right Side Metadata Panel */}
                <div className="md:w-1/2 p-8 sm:p-10 flex flex-col justify-between overflow-y-auto">
                  <div className="space-y-6">
                    <div>
                      <span className="text-[10px] text-[#6b1d2f] uppercase tracking-widest font-bold block mb-1">
                        {selectedProject.category}
                      </span>
                      <h3 className="text-2xl font-bold text-white uppercase">{selectedProject.title}</h3>
                    </div>
                    
                    <p className="text-xs text-neutral-300 leading-relaxed">
                      {selectedProject.longDescription}
                    </p>

                    <div className="p-4 bg-neutral-900 rounded-xl border border-neutral-800 text-[11px] text-neutral-500">
                      <strong className="text-white">Live Platform Status:</strong> Designed with absolute responsive layouts, standard-compliant markup frameworks, and clean code optimization.
                    </div>
                  </div>

                  <div className="flex items-center gap-4 pt-8 border-t border-neutral-800/60 mt-6">
                    <a
                      href={selectedProject.liveUrl}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="inline-flex items-center gap-2 px-6 py-3 bg-[#6b1d2f] hover:bg-[#802237] text-white text-xs uppercase tracking-widest font-bold rounded-lg transition-all duration-300"
                    >
                      Visit Live Site
                      <Icon.ExternalLink className="w-3.5 h-3.5" />
                    </a>
                    <button
                      onClick={() => setSelectedProject(null)}
                      className="inline-flex items-center gap-1.5 px-6 py-3 border border-neutral-800 hover:border-neutral-600 text-[#d4af37] hover:text-white text-xs uppercase tracking-widest font-bold rounded-lg transition-all duration-300"
                    >
                      Close
                    </button>
                  </div>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    }

    // ==========================================
    // INITIALIZATION & MOUNT
    // ==========================================
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
